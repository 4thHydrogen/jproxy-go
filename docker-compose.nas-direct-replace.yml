services:
  jproxy:
    build:
      context: .
      dockerfile: Dockerfile.nas-binary
    container_name: jproxy
    restart: unless-stopped
    environment:
      CORE_PROXY_ADDR: ":8117"
      CORE_PROXY_MIN_COUNT: "6"
      JPROXY_DB_PATH: "/data/jproxy.db"
      WEB_DIST_PATH: "/app/web-dist"
    ports:
      - "8117:8117"
    volumes:
      - /your/nas/path/jproxy.db:/data/jproxy.db
    healthcheck:
      test: ["CMD", "/app/core-proxy", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
